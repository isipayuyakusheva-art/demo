<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Макет: Новая заявка 390×844</title>
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<div>
    <div class="page-title">Новая заявка</div>
    <div class="caption">390 × 844 px</div>
    <div class="phone">
        <div class="status-bar"><span>9:41</span><span>5G ▮▮▮ 100%</span></div>
        <div class="app-bar"><div><div class="title">Формирование заявки</div><div class="sub">Все поля обязательны</div></div></div>
        <div class="screen">
            <label>Адрес<div class="input">г. Москва, ул. Чистая, д. 1</div></label>
            <label>Контактный телефон<div class="input">+7(900)-123-45-67</div></label>
            <label>Вид услуги<div class="select">Генеральная уборка ▾</div></label>
            <label>Желаемая дата<div class="input">15.06.2026</div></label>
            <label>Желаемое время<div class="input">14:30</div></label>
            <fieldset>
                <legend>Тип оплаты</legend>
                <div class="radio"><span class="dot on"></span> Наличные</div>
                <div class="radio"><span class="dot"></span> Банковская карта</div>
            </fieldset>
            <div class="btn">Создать</div>
            <div class="btn btn-ghost">Отмена</div>
        </div>
    </div>
</div>
</body>
</html>
